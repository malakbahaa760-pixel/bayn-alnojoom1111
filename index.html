<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>بين النجوم</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(#05010f, #12004a);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 50px;
      color: gold;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      background: gold;
      margin-top: 20px;
    }

    .star {
      position: fixed;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 10px white;
      animation: fall 4s linear forwards;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>بين النجوم 🌙</h1>

  <button onclick="addStar()">أضف نجمة ⭐</button>

  <script>
    function addStar() {
      const star = document.createElement("div");
      star.classList.add("star");

      star.style.left = Math.random() * window.innerWidth + "px";

      document.body.appendChild(star);

      setTimeout(() => {
        star.remove();
      }, 4000);
    }
  </script>

</body>
</html>
